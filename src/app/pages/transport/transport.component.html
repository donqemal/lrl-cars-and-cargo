<section class="section dark">
  <div class="hero-bg">
    <div class="grid"></div>
    <div class="glow two"></div>
  </div>

  <div class="section-head reveal">
    <p class="eyebrow">Logistik / 01</p>
    <h1 class="split-text">Sicherer Transport.</h1>
    <p>Wir bringen Ihr Fahrzeug von A nach B — in der Schweiz.</p>
  </div>

  <div class="form-container-premium reveal delay-1">
    <form class="contact-form-premium">
      <div class="form-grid">
        <div class="form-group">
          <label>Startort*</label>
          <input id="fromAdress" type="text" placeholder="z.B. Zürich" #fromAdress required>
        </div>
        <div class="form-group">
          <label>Endort*</label>
          <input id="toAdress" type="text" placeholder="z.B. Genf" #toAdress required>
        </div>
      </div>

      @if (showFromAdress && showToAdress) {
        <div class="info-card">
          <div class="info-row">
            <span>Route</span>
            <strong>{{ showFromAdress }} → {{ showToAdress }}</strong>
          </div>
          <div class="info-row">
            <span>Distanz</span>
            <strong>{{ distance }}</strong>
          </div>
          <div class="info-row highlight">
            <span>Schätzung</span>
            <strong>~CHF {{ price }}</strong>
          </div>

          <div class="form-footer">
            <button class="btn magnetic" type="button" (click)="navigatePage()">
              <span>Weiter zum Angebot</span>
            </button>
          </div>
        </div>
      }

      <div id="map" class="map-container reveal delay-2"></div>
    </form>
  </div>
</section>

<app-footer></app-footer>
