<header class="site-header" id="top" #header [class.scrolled]="scrolled" [class.menu-open]="menuOpen">
  <a class="brand" (click)="scrollToTop($event)" style="cursor: pointer;" aria-label="LRL Cars Startseite">
    <img alt="Logo" src="assets/logo.svg">
  </a>
  <nav class="desktop-nav" aria-label="Hauptnavigation">
    <a routerLink="/über-uns" routerLinkActive="active">Über uns</a>
    <a routerLink="/fahrzeuge" routerLinkActive="active">Fahrzeuge</a>
    <a routerLink="/verkaufen" routerLinkActive="active">Verkaufen</a>
    <a routerLink="/transport" routerLinkActive="active">Transport</a>
    <a routerLink="/" fragment="contact" [class.active]="contactActive">Kontakt</a>
  </nav>
  <a class="btn small magnetic" routerLink="/" fragment="contact"><span>Auto finden</span></a>
  <button class="menu-btn" type="button" aria-label="Menü öffnen" aria-expanded="false" aria-controls="mobileNav" (click)="toggleMenu()" [class.active]="menuOpen">
    <span></span><span></span>
  </button>
</header>

<nav class="mobile-nav" id="mobileNav" aria-label="Mobile Navigation" [class.open]="menuOpen">
  <button class="close-menu" type="button" aria-label="Menü schliessen" (click)="toggleMenu(false)">
    <span></span><span></span>
  </button>
  <a routerLink="/über-uns" routerLinkActive="active" (click)="toggleMenu(false)">Über uns</a>
  <a routerLink="/fahrzeuge" routerLinkActive="active" (click)="toggleMenu(false)">Fahrzeuge</a>
  <a routerLink="/verkaufen" routerLinkActive="active" (click)="toggleMenu(false)">Verkaufen</a>
  <a routerLink="/transport" routerLinkActive="active" (click)="toggleMenu(false)">Transport</a>
  <a routerLink="/" fragment="contact" [class.active]="contactActive" (click)="toggleMenu(false)">Kontakt</a>
</nav>
